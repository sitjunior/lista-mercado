name: deploy-prd

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy source via rsync
        uses: burnett01/rsync-deployments@8.0.0
        with:
          switches: >-
            -azr --delete
            --exclude='.git*'
            --exclude='node_modules/'
            --exclude='.env'
            --exclude='.DS_Store'
          path: ./
          remote_path: /var/www/html/lista-mercado/repo/
          remote_host: ${{ secrets.HOST }}
          remote_user: ${{ secrets.USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Build & restart on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/html/lista-mercado/repo

            set -a
            source .env
            set +a

            npm ci

            npm run build

            mkdir -p .next/standalone/.next/static
            cp -r .next/static/. .next/standalone/.next/static/
            if [ -d public ]; then
              cp -r public .next/standalone/public
            fi

            rsync -a --delete --exclude='.env' .next/standalone/ /var/www/html/lista-mercado/prd/

            cd /var/www/html/lista-mercado/prd
            set -a
            source .env
            set +a
            export HOSTNAME=127.0.0.1
            export PORT=3002
            pm2 delete lista-mercado 2>/dev/null || true
            pm2 start server.js --name lista-mercado -- --port=3002
            pm2 save
